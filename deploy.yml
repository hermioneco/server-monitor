name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Login sur Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et push de l'image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}~/server-monitor:latest
  deploy:
    name: Deploy with Ansible
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/do_server_monitor
          chmod 600 ~/.ssh/do_server_monitor
          ssh-keyscan -H ${{ secrets.DROPLET_IP }} >> ~/.ssh/known_hosts

      - name: Créer l'inventaire Ansible dynamique
        run: |
          cat > ansible/inventory.ini << EOF
          [webservers]
          ${{ secrets.DROPLET_IP }} ansible_user=root ansible_ssh_private_key_file=~/.ssh/do_server_monitor

          [webservers:vars]
          ansible_python_interpreter=/usr/bin/python3
          EOF

      - name: Lancer le déploiement Ansible
        run: |
          cd ansible
          ansible-playbook deploy.yml

      - name: Vérifier le health check
        run: |
          sleep 10
          curl -f http://${{ secrets.DROPLET_IP }}:5000/health
