services:
  db:
    image: postgres:16-alpine
    container_name: monitor_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: servermonitor
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d servermonitor"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: monitor_api
    env_file: .env
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  pg_data:

