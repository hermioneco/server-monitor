---
- name: Configuration initiale du serveur
  hosts: webservers
  become: true

  tasks:
    - name: Mettre à jour les paquets apt
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Installer les dépendances Docker
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    - name: Ajouter la clé GPG Docker
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
    - name: Ajouter le dépôt Docker
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Installer Docker et Docker Compose
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Démarrer et activer Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Vérifier que Docker fonctionne
      command: docker --version
      register: docker_version

    - name: Afficher la version Docker
      debug:
        msg: "{{ docker_version.stdout }}"
