---
- name: Déploiement de CyberWatch
  hosts: webservers
  become: true

  tasks:
    - name: Créer le dossier de l'application
      file:
        path: /opt/cyberwatch
        state: directory
        mode: '0755'

    - name: Créer le docker-compose de production
      copy:
        dest: /opt/cyberwatch/docker-compose.yml
        content: |
          services:
            db:
              image: postgres:16-alpine
              container_name: cyberwatch_db
              environment:
                POSTGRES_USER: admin
                POSTGRES_PASSWORD: secret123
                POSTGRES_DB: cyberwatch
              volumes:
                - pg_data:/var/lib/postgresql/data
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U admin -d cyberwatch"]
                interval: 5s
                timeout: 5s
                retries: 5

            app:
              image: hahahahahahaha853/cyberwatch:latest
              container_name: cyberwatch_app
              environment:
                POSTGRES_HOST: db
                POSTGRES_PORT: 5432
                POSTGRES_DB: cyberwatch
                POSTGRES_USER: admin
                POSTGRES_PASSWORD: secret123
              ports:
                - "8080:8080"
              depends_on:
                db:
                  condition: service_healthy
              restart: on-failure

          volumes:
            pg_data:

    - name: Lancer les conteneurs depuis Docker Hub
      shell: |
        cd /opt/cyberwatch
        docker compose pull
        docker compose down
        docker compose up -d

    - name: Attendre que l'app soit prête
      uri:
        url: http://localhost:8080/api/incidents/health
        method: GET
        status_code: 200
      register: health_check
      retries: 15
      delay: 10
      until: health_check.status == 200

    - name: Confirmer que l'app est en ligne
      debug:
        msg: "✅ CyberWatch déployé sur http://{{ inventory_hostname }}"
